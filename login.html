<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - ShortsMaker</title>
  <link rel="stylesheet" href="./login.css" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card" role="dialog" aria-modal="true" aria-label="로그인">
      <button class="login-close" type="button" aria-label="닫기" id="closeBtn">×</button>
      <h1 class="login-title"><span class="brand-accent">Shorts</span>Maker에 오신 것을 환영합니다!</h1>
      <p class="login-subtitle">Google 계정으로 간편하게 시작하세요</p>

      <label class="login-checkbox">
        <input type="checkbox" id="marketingOptIn" />
        <span>(선택) 신규 기능, 프로모션 등 마케팅 정보 수신에 동의합니다</span>
      </label>

      <button class="google-btn" id="googleLoginBtn" type="button">Google로 로그인/회원가입</button>

      <p class="login-legal">
        계속하면 이용약관 및 개인정보처리방침에 동의하는 것으로 간주됩니다.
      </p>
      <p id="loginError" class="login-error" hidden></p>
    </section>
  </main>

  <!-- Firebase Web SDK (Auth) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="./login.js"></script>
</body>
</html>
